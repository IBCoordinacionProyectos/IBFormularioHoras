version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: always
    ports:
      - "80:80"
      - "443:443"
    networks:
      - app-network
    environment:
      - VIRTUAL_HOST=horas.yeisonduque.top
      - LETSENCRYPT_HOST=horas.yeisonduque.top
      - LETSENCRYPT_EMAIL=tu@email.com  # Reemplaza con tu email
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/run
      - /var/cache/nginx
      - /tmp
    volumes:
      - ./frontend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/nginx/conf.d/:/etc/nginx/conf.d/:ro
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
