# Run as a unique, less privileged user for security
user  nginx;

# Set number of worker processes automatically based on number of CPU cores
worker_processes  auto;

# Enable debug logging
worker_rlimit_core 50M;
worker_rlimit_nofile 100000;

# Error logs to stderr with debug level
error_log  /var/log/nginx/error.log debug;

# Debug log for main process
error_log  /var/log/nginx/debug.log debug_http;

debug_points stop;
debug_connection 127.0.0.1;
debug_connection ::1;
pid        /tmp/nginx.pid;  # Changed to /tmp which is writable

events {
    worker_connections  1024;  # Increase this if you have many connections
}

http {
    # Enable debug logging for HTTP module
    log_format debug '[$time_local] $remote_addr - $remote_user "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" uht="$upstream_header_time" urt="$upstream_response_time"';

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # Enable debug output
    log_not_found on;
    log_subrequest on;

    # Set path for temp files
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp_path;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    # Logging settings
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" "$request_id"';

    access_log  /var/log/nginx/access.log  debug;
    access_log  /var/log/nginx/requests.log  main;

    # Performance optimizations
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip  on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Virtual Host Configs
    include /etc/nginx/conf.d/*.conf;
}

server {
    listen       80;
    server_name  localhost;
    root         /usr/share/nginx/html;
    
    # Debug settings
    rewrite_log on;
    error_log /var/log/nginx/server_error.log debug;
    
    # Add request ID for tracking
    add_header X-Request-ID $request_id;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache control for static assets
    location ~* \.(?:jpg|jpeg|gif|png|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
