server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Seguridad básica
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Cache fuerte para assets con hash
  location ~* \.[a-f0-9]+\.(js|mjs|css|woff2?|eot|ttf|otf|svg|png|jpg|jpeg|gif|ico)$ {
    access_log off;
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    try_files $uri =404;
  }

  # index.html sin cache (evita servir versión vieja)
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    expires 0;
    try_files $uri =404;
  }

  # Fallback SPA
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Gzip
  gzip on;
  gzip_comp_level 5;
  gzip_types
    text/plain text/css application/javascript application/json application/manifest+json
    application/xml+rss application/xml image/svg+xml font/ttf font/otf application/font-woff
    application/font-woff2;
  gzip_min_length 1024;
  gzip_vary on;

  # Disable logging for static files
  location = /robots.txt { access_log off; log_not_found off; }
  location = /favicon.ico { access_log off; log_not_found off; }
  
  # Error pages
  error_page 404 /index.html;
  error_page 500 502 503 504 /50x.html;
  location = /50x.html {
    
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Cache for versioned assets (files with hash in name)
    location ~* \.[a-f0-9]+\.(js|mjs|css|woff2?|eot|ttf|otf|svg|png|jpg|jpeg|gif|ico)$ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # No cache for index.html
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires 0;
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip compression
    gzip on;
    gzip_comp_level 5;
    gzip_types
        text/plain text/css application/javascript application/json application/manifest+json
        application/xml+rss application/xml image/svg+xml font/ttf font/otf application/font-woff
        application/font-woff2;
    gzip_min_length 1024;
    gzip_vary on;

    # Disable logging for static files
    location = /robots.txt { access_log off; log_not_found off; }
    location = /favicon.ico { access_log off; log_not_found off; }
    
    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
