worker_processes  auto;
pid        /tmp/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        server_name  localhost;  # Cambia esto a tu dominio si es necesario

        # Ruta a los archivos construidos de React
        root   /usr/share/nginx/html;
        index  index.html;

        # Configuración para SPA (Single Page Application)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Configuración de caché para assets estáticos
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, no-transform";
        }

        # Deshabilitar el acceso a archivos ocultos
        location ~ /\. {
            deny all;
        }

        # Configuración de seguridad
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        
        # Configuración de gzip
        gzip on;
        gzip_vary on;
        gzip_min_length 10240;
        gzip_proxied expired no-cache no-store private auth;
        gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml;
        gzip_disable "MSIE [1-6]\.";
    }
}
