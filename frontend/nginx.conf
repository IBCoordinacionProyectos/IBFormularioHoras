# Main server block for HTTPS
server {
    listen 443 ssl http2;
    server_name horas.yeisonduque.top www.horas.yeisonduque.top;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    
    # Security settings
    server_tokens off;
    client_max_body_size 10M;
    
    # Set real IP from proxy
    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;
    
    # Root directory and index
    root /usr/share/nginx/html;
    index index.html index.htm;
    
    # SSL Configuration for frontend
    ssl_certificate /etc/letsencrypt/live/horas.yeisonduque.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/horas.yeisonduque.top/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/horas.yeisonduque.top/chain.pem;

    # Main location block for frontend
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Backend API will be accessed directly via backend.yeisonduque.top
    # No need for proxy_pass as frontend will call backend directly
    
    # CORS headers for API calls from frontend
    add_header 'Access-Control-Allow-Origin' 'https://horas.yeisonduque.top' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
    add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
    
    # Cache control for assets
    location ~*\.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff2?)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
    
    # Cache static assets
    location ~*\.(?:css|js)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
    
    # Deny access to .htaccess files
    location ~ /\.ht {
        deny all;
    }

    # API proxy
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Error pages
    error_page 404 /index.html;
    location = /index.html {
        internal;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
